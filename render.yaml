services:
  - type: web
    name: fb-ads-leads-scraper
    runtime: python
    env: python
    plan: free
    region: oregon
    # IMPORTANT: Python environment (NOT Docker) so the free tier build does not
    # blow the 2GB image / build-time budget.
    buildCommand: "pip install --upgrade pip setuptools wheel && { pip install --prefer-binary --only-binary=:all: greenlet==3.0.3 || pip install greenlet==3.0.3; } && pip install --prefer-binary -r requirements.txt && python -m playwright install chromium"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 300"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
